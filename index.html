<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo-192.png" />
    <link rel="apple-touch-icon" href="/logo-192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=3.0" />
    <meta name="theme-color" content="#F7F5F0" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="爻一爻" />
    <title>爻一爻 - 仅供娱乐</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // GitHub Pages SPA fallback: restore the original path from 404.html redirect
      (function () {
        var redirect = sessionStorage.redirect;
        delete sessionStorage.redirect;
        if (redirect && redirect !== location.pathname) {
          var path = redirect.replace(/^\/yaoyiyao/, '') || '/';
          history.replaceState(null, '', '/yaoyiyao' + path);
        }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
